table:
  name: metadata_roots
  schema: public
  is_table: true
select_permissions:
  - role: user
    permission:
      columns:
        - root_cid
        - head_cid
        - name
        - metadata
        - tags
        - created_at
        - updated_at
      filter: {}
      allow_aggregations: true
    comment: ""
  - role: anonymous
    permission:
      columns:
        - root_cid
        - head_cid
        - name
        - metadata
        - tags
        - created_at
        - updated_at
      # Mirror the metadata table: never expose roots an owner has removed
      # (moved to Trash) to anonymous clients, so trashed objects stay out of
      # the global explorer/search even via direct GraphQL.
      filter:
        _or:
          - _not:
              inner_metadata:
                object_ownership:
                  is_admin:
                    _eq: true
          - inner_metadata:
              object_ownership:
                is_admin:
                  _eq: true
                marked_as_deleted:
                  _is_null: true
      allow_aggregations: true
    comment: ""
object_relationships:
  - name: inner_metadata
    using:
      manual_configuration:
        column_mapping:
          root_cid: root_cid
        insertion_order: null
        remote_table:
          name: metadata
          schema: public
